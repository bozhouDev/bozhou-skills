# 对比布局
name: comparison
description: 左右对比布局，用于 A vs B 对比

size: [1920, 1080]

text_zones:
  - name: page_title
    position: [160, 60, 1600, 80]
    align: center
    font_size: 36
    font_weight: bold
    max_chars: 30
  - name: left_header
    position: [80, 180, 860, 60]
    align: center
    font_size: 28
    font_weight: bold
    max_chars: 20
  - name: left_content
    position: [80, 260, 860, 740]
    align: left
    font_size: 18
    line_height: 1.5
    max_chars: 250
  - name: right_header
    position: [980, 180, 860, 60]
    align: center
    font_size: 28
    font_weight: bold
    max_chars: 20
  - name: right_content
    position: [980, 260, 860, 740]
    align: left
    font_size: 18
    line_height: 1.5
    max_chars: 250

# 模式1：纯背景
prompt_template: |
  16:9 landscape PPT comparison page background, 1920x1080 pixels,
  {style_description}
  {theme_description}
  side-by-side A vs B comparison layout,
  clear vertical divider in center,
  contrasting visual treatment for left and right sides,
  NO TEXT, NO WORDS, empty background ready for content overlay,
  balanced comparison design

# 模式2：完整图片（AI生成风格化文字）
prompt_template_full: |
  Create a presentation slide image following these guidelines:

  ## Image Specifications
  - Type: A vs B comparison slide
  - Aspect Ratio: 16:9 (1920x1080 pixels)
  - Style: Professional slide deck

  ## Core Persona: The Architect
  You are "The Architect" - create clear, balanced comparison visualizations.

  ## Design Style
  {style_description}
  {theme_description}

  ## Layout: Binary Comparison
  - Title at top spanning full width
  - Left side: Option A with header + content
  - Right side: Option B with header + content
  - Clear visual distinction between sides
  - "VS" or divider in center

  ## Text Content (CRITICAL - MUST BE INCLUDED)
  Page Title: {title}

  Left Side (A):
  {left_content}

  Right Side (B):
  {right_content}

  ## Text Style Rules (CRITICAL)
  - ALL text MUST match the designated style exactly
  - Title: Large, bold, centered at top
  - Side headers: Bold, prominent
  - Content: Regular bullet points
  - DO NOT use realistic or computer-generated fonts unless style specifies

  ## Core Principles
  - Hand-drawn quality if style requires
  - NO slide numbers, page numbers, footers, headers, or logos
  - Clear visual distinction between two options

  ## Language
  - Render text in the same language as provided content

best_for:
  - 优劣对比
  - 前后对比
  - 方案比较
