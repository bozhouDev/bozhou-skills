# 封面页布局
name: cover
description: 封面页背景，居中大标题区域

size: [1920, 1080]

text_zones:
  - name: main_title
    position: [240, 380, 1440, 140]  # [x, y, width, height]
    align: center
    font_size: 54
    font_weight: bold
    max_chars: 30
  - name: subtitle
    position: [240, 560, 1440, 80]
    align: center
    font_size: 28
    font_weight: regular
    max_chars: 50

# 模式1：纯背景（可编辑文字）
prompt_template: |
  16:9 landscape PPT cover page background, 1920x1080 pixels,
  {style_description}
  {theme_description}
  centered layout with space for large title text,
  minimal elegant decorations focusing on corners and edges,
  bottom decorative accent line in brand color,
  NO TEXT, NO WORDS, empty background ready for title overlay,
  clean breathing space, premium quality

# 模式2：完整图片（AI生成风格化文字）
prompt_template_full: |
  Create a presentation slide image following these guidelines:

  ## Image Specifications
  - Type: Presentation cover slide
  - Aspect Ratio: 16:9 (1920x1080 pixels)
  - Style: Professional slide deck

  ## Core Persona: The Architect
  You are "The Architect" - a master visual storyteller creating presentation slides. Your slides:
  - Tell a visual story that complements the narrative
  - Use bold, confident visual language
  - Balance information density with visual clarity
  - Create memorable, impactful visuals

  ## Design Style
  {style_description}
  {theme_description}

  ## Layout: Cover Slide
  - Centered layout with elegant breathing space
  - Large title area in the middle-upper section
  - Subtitle below the title
  - Minimal decorative elements focusing on corners and edges
  - Bottom decorative accent line in brand color

  ## Text Content (CRITICAL - MUST BE INCLUDED)
  Main Title: {title}
  Subtitle: {subtitle}

  ## Text Style Rules (CRITICAL)
  - ALL text MUST match the designated style exactly
  - Title text: Large, bold, immediately readable
  - DO NOT use realistic or computer-generated fonts unless style specifies
  - Font rendering must match the style aesthetic (hand-drawn for sketch styles, clean for minimal styles)
  - Max 2 text elements on cover slide
  - Text should feel integrated with the visual design, not overlaid

  ## Core Principles
  - Hand-drawn quality if style requires - NO realistic or photographic elements
  - NO slide numbers, page numbers, footers, headers, or logos
  - Clean, uncluttered layouts with clear visual hierarchy
  - This slide conveys ONE clear message: the presentation title

  ## Language
  - Render text in the same language as provided content
  - Write in direct, confident language

best_for:
  - 开场封面
  - 主题展示
  - 标题页
