# 居中强调内容页布局
name: content_center
description: 居中强调内容页，用于重要概念或术语解释

size: [1920, 1080]

text_zones:
  - name: emphasis_title
    position: [360, 300, 1200, 70]  # [x, y, width, height]
    align: center
    font_size: 28
    font_weight: bold
    max_chars: 20
  - name: emphasis_content
    position: [360, 420, 1200, 340]
    align: center
    font_size: 20
    line_height: 1.5
    max_chars: 200

# 模式1：纯背景（可编辑文字）
prompt_template: |
  16:9 landscape PPT emphasis content page background, 1920x1080 pixels,
  {style_description}
  {theme_description}
  centered emphasis card container at position (300px, 260px),
  card dimensions 1320x560 pixels,
  light theme-tinted white background (95% white, 5% theme color),
  1px border in theme brand color with 15% opacity,
  rounded corners 20px, subtle elegant shadow,
  empty card ready for emphasized important text content,
  clean minimal design for highlighting key concepts,
  NO TEXT, NO WORDS,
  keynote emphasis slide style

# 模式2：完整图片（AI生成风格化文字）
prompt_template_full: |
  Create a presentation slide image following these guidelines:

  ## Image Specifications
  - Type: Emphasis/key concept slide
  - Aspect Ratio: 16:9 (1920x1080 pixels)
  - Style: Professional slide deck

  ## Core Persona: The Architect
  You are "The Architect" - a master visual storyteller. Your slides create memorable, impactful visuals.

  ## Design Style
  {style_description}
  {theme_description}

  ## Layout: Centered Emphasis
  - Centered emphasis card for key concept
  - Clean minimal design for highlighting key concepts
  - Clear visual hierarchy
  - Focal point draws attention to main message

  ## Text Content (CRITICAL - MUST BE INCLUDED)
  Title: {title}

  Main Content:
  {content}

  ## Text Style Rules (CRITICAL)
  - ALL text MUST match the designated style exactly
  - Title: Bold, centered, draws attention
  - Content: Clear, centered, multi-line if needed
  - DO NOT use realistic or computer-generated fonts unless style specifies
  - Font rendering must match the style aesthetic
  - Text should feel integrated with the visual design

  ## Core Principles
  - Hand-drawn quality if style requires
  - NO slide numbers, page numbers, footers, headers, or logos
  - Clean, uncluttered layout
  - ONE clear focal message

  ## Language
  - Render text in the same language as provided content

best_for:
  - 术语解释
  - 重要概念
  - 核心观点
  - 数据强调
