# ============================================================
# 使用说明
# ============================================================
# 
# 1. 当 Claude 遇到评分表未覆盖的场景时：
#    - 先检查此文件的 confirmed_scenes
#    - 如果有匹配，使用其 recommended_styles
#    - 如果没有，创建新条目到 pending_scenes
#
# 2. 用户反馈后：
#    - good: 增加该场景的置信度
#    - bad/changed: 记录并调整推荐
#
# 3. 当某场景积累 3+ 个 good 反馈后：
#    - 从 pending_scenes 移到 confirmed_scenes
#    - 考虑更新 SKILL.md 主评分表
