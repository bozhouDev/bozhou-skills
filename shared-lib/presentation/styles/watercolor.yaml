# Watercolor Style (from baoyu-slide-deck)
name: watercolor
description: 水彩插画风格 - 手绘温暖的艺术美学

prompt_template: |
  16:9 landscape aspect ratio, WATERCOLOR STYLE with soft hand-painted textures.

  [DESIGN AESTHETIC]:
  Gentle watercolor aesthetic with visible brush strokes and natural color bleeding. Hand-painted feel with soft edges and organic shapes. Warm, approachable, and artistically refined. Combines artistic expression with clear information delivery.

  [BACKGROUND]:
  - Color: Warm Off-White (#FAF8F0) or Soft Cream (#FFF9E6)
  - Texture: Subtle watercolor paper texture with visible grain

  [TYPOGRAPHY]:
  - Headlines: Elegant handwritten or brush script for titles. Organic letterforms with natural variation. Warm, personal feeling. May appear as actual hand-painted lettering.
  - Body: Clean rounded sans-serif or casual handwriting style. Readable at smaller sizes. Maintains artistic cohesion.

  [COLOR PALETTE]:
  - Background: Warm Off-White #FAF8F0
  - Primary Text: Warm Charcoal #3D3D3D
  - Accent 1: Soft Coral #F4A261
  - Accent 2: Dusty Rose #E8A0A0
  - Accent 3: Sage Green #87A96B
  - Accent 4: Sky Blue #7EC8E3
  - Accent 5: Soft Lavender #C5B4E3
  - Wash: Pale Yellow #FFF3C4

  [VISUAL ELEMENTS]:
  - Watercolor washes as section backgrounds
  - Illustrated icons with visible brush strokes
  - Natural elements: leaves, bubbles, flowers
  - Color bleeds and soft edges on all elements
  - Hand-drawn arrows and connection lines
  - Labeled diagrams with watercolor fills
  - Small expressive character illustrations
  - Decorative nature accents scattered thoughtfully

  [KEY RULES]:
  ✅ Allow color to bleed beyond sharp edges
  ✅ Use visible brush stroke textures
  ✅ Create soft, organic shapes
  ❌ No sharp geometric shapes
  ❌ No hard edges or digital precision
  ❌ No slide numbers, footers, or logos

supports_themes: false
best_for:
  - 生活方式
  - 健康养生
  - 旅行指南
  - 艺术创意
