name: xiaohongshu
display_name: 小红书风格
description: 情绪操纵+认知重塑，制造高互动内容。去爹味，口语化。

# 核心特征
characteristics:
  - 标题像重锤，封面像尖刀
  - 前3秒决定生死
  - 情绪波动曲线（2-3处转折）
  - 短段落（每段不超过3行）
  - 去爹味，平等对话
  - emoji点缀，不堆砌

# 适用场景
best_for:
  - 小红书笔记
  - 种草文
  - 干货分享
  - 产品推荐

# 目标字数
word_count:
  min: 800
  max: 1200

# 标题公式
title_formulas:
  - "数字+结果"  # 7天瘦10斤的食谱
  - "前后对比"   # 从月薪3k到3w，我只做了这件事
  - "悬念钩子"   # 离职后我才明白的3个真相
  - "身份+痛点"  # 打工人必看｜35岁危机自救指南
  - "打破常识"   # 别再xxx了，真的没用

# 四段式结构
structure:
  part1: 建立联结（让读者觉得"你懂我"）
  part2: 撕开痛点（制造心理不平衡）
  part3: 真相解法（输出干货，定义式金句）
  part4: 价值升华（讲小情绪，制造转发欲望）

# 语言转换
language_map:
  非常好: 绝了/太香了/爱住了
  推荐: 安利/种草/闭眼入
  不推荐: 避雷/踩坑/劝退
  很重要: 划重点/敲黑板/记笔记
  效果好: 真的有效/亲测好用/回购N次

# 去爹味规则
avoid:
  - 你应该（改为：我之前也不会，后来发现...）
  - 你要记住（改为：有个小技巧分享给大家...）
  - 你必须（改为：我踩过坑，现在这样做...）
  - 我教你（改为：我们一起来看看...）
  - 学术词汇
  - 超过20字的长句

# 互动钩子
interaction:
  comment: "你们踩过哪些坑？评论区交流～"
  save: "先收藏！回头慢慢看，别划走就忘了"
  share: "转给你身边需要的人"
  follow: "关注我，下期更新xxx"

# 标签格式
tags: "#核心话题 #细分领域 #人群标签 #场景标签 #热点标签"
