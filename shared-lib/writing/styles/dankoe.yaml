name: dankoe
display_name: Dankoe风格
description: 对话式挑衅，长篇深度，理论与实践结合，反主流叙事。

# 核心特征
characteristics:
  - 直接用"你"与读者对话
  - 开篇挑战既有观念
  - 不回避尖锐表达
  - 长短句交替，节奏变化
  - 个人化叙事
  - 重复强化关键观点

# 适用场景
best_for:
  - 深度思考文章
  - 个人成长内容
  - 反常识观点
  - 系统化框架输出

# 目标字数
word_count:
  min: 5000
  max: 8000

# 文章结构
structure:
  opening:
    ratio: 10%
    elements:
      - 挑衅性陈述或反常识观点
      - 说明阅读时间和价值
      - 列出核心观点数量
  body:
    ratio: 80%
    elements:
      - 中文序号标题（一、二、三...）
      - 诊断问题→揭示原因→提供解决方案
      - 引用权威观点
      - 具体案例/类比
      - 对比论证
      - 反问句引导思考
  closing:
    ratio: 10%
    elements:
      - 简短总结（2-3句）
      - 鼓励性话语
      - 个人化签名

# 修辞手法
rhetoric:
  - 对比（过去vs现在，传统vs创新）
  - 类比（让抽象概念具体化）
  - 排比（增强节奏感）
  - 问句序列（从浅入深引导）

# 语言特点
language:
  - 口语化与学术性混合
  - 长句阐述 + 短句冲击
  - 个人经历分享
  - 从不同角度反复阐述关键点

# 禁止使用
avoid:
  - 空洞励志（"你可以做到任何事！"）
  - 过度承诺（"保证你会成功！"）
  - 过时话术（"限时优惠！"）
  - 忽略复杂性（"只需要3个简单步骤！"）

# 章节模板
chapter_template: |
  [序号]、[挑衅性/洞察性标题]
  
  你有没有想过，为什么[现象]？
  
  真正的原因是什么？
  
  不是[表面原因]。
  
  而是[深层原因]。
  
  [名人/学者]曾说："[引用]"
  
  这句话揭示了[深层含义]。
  
  想象一下[场景]。
  
  这就像[类比]。
  
  大多数人[常见做法]。
  
  但真正有效的是[反常识做法]。

# 签名格式
signature: "– [作者名字]"
