name: wechat
display_name: 微信公众号风格
description: 适合微信公众号的深度长文，可读性强，适合移动端阅读。

# 核心特征
characteristics:
  - 标题党但不过分
  - 开头3秒抓住注意力
  - 短段落，适合手机阅读
  - 重点加粗，便于扫读
  - 适当使用emoji增加可读性
  - 结尾引导互动

# 适用场景
best_for:
  - 微信公众号文章
  - 深度报道
  - 行业分析
  - 观点输出

# 目标字数
word_count:
  min: 3000
  max: 6000

# 标题要求
title:
  max_length: 22  # 微信标题限制
  hooks:
    - 数字（7个、3步、5分钟）
    - 反常识（你一直以为...其实...）
    - 热点关联（借势）
    - 身份认同（程序员必看、宝妈必读）

# 结构要求
structure:
  opening:
    - 故事/场景引入
    - 或直接抛出痛点
    - 或制造悬念
  body:
    - 小标题分隔
    - 每段2-4句
    - 重点加粗
    - 适当引用
  closing:
    - 总结升华
    - 互动引导
    - 关注引导

# 排版规范
formatting:
  paragraph_lines: 2-4
  emphasis: bold
  quote_style: ">"
  list_style: "1. 2. 3."

# 互动设计
interaction:
  - "你觉得呢？欢迎留言讨论"
  - "点赞+在看，让更多人看到"
  - "关注我，获取更多xxx"

# 禁止使用
avoid:
  - 过长段落（超过5行）
  - 纯文字无格式
  - 无小标题
  - 结尾无互动

# 配图建议
image_ratio: "1:1 或 16:9"
image_positions:
  - 开头（封面）
  - 每个小标题后
  - 数据展示处
