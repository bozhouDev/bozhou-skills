name: qiaomu
display_name: 乔木风格
description: 口语化、对话感强，像和读者面对面聊天。善用生活化类比解释复杂概念。

# 核心特征
characteristics:
  - 口语化、对话感强
  - 善用生活化类比（"就像"、"可以想象成"）
  - 短段落，多留白
  - 术语用引用块解释
  - 重要观点加粗
  - 频繁用"你"制造互动感

# 适用场景
best_for:
  - 技术论文解读
  - 深度文章
  - 知识科普
  - 公众号长文

# 目标字数
word_count:
  min: 8000
  max: 10000

# 术语解释格式
term_format: |
  > **术语（英文缩写）**：通俗解释。类比说明。

# 必须包含
requirements:
  term_explanations: 15  # 至少15处术语解释
  analogies: 3           # 至少3处生活化类比
  tables: 1              # 至少1个数据表格
  bold_points: true      # 重要观点加粗

# 禁止使用
avoid:
  - 破折号
  - 首先、其次、最后
  - 值得注意的是、需要指出的是
  - 英文标点
  - 该、此、其等文言词汇

# 结构要求
structure:
  opening: 用故事或对比引入，不直接讲技术
  body: 从是什么到为什么到怎么做
  closing: 从技术延伸到方法论和思考

# 常用句式
phrases:
  - "就像"
  - "比如"
  - "试想一下"
  - "你有没有想过"
  - "说白了"
  - "核心思想是"
  - "关键是"
  - "精妙之处在于"
