# ============================================================
# 图片生成 API 配置文件
# 填入你有的 provider 的 API key，没有的留空即可
# 优先级在 defaults.image_model_priority 中配置
# ============================================================

defaults:
  # provider 优先级（从左到右依次尝试，失败则跳到下一个）
  # 可选值: google-local, modelscope, zimage, volcengine, apimart
  image_model_priority:
    - google-local
    - apimart

# ============================================================
# Provider 1: Google Local (Gemini 图像生成)
# 通过本地代理访问 Gemini API
# ============================================================
google-local:
  api_base: "http://127.0.0.1:7897"  # 本地代理地址
  api_key: "AIzaSyDmW2j4RfN4VJyFEu3oRpG8Qvof4WL7Xww"  # 填入你的 API key

# ============================================================
# Provider 2: ModelScope (通义万相 / Z-Image-Tongyi)
# https://modelscope.cn
# ============================================================
ModelScope:
  api_base: "https://api-inference.modelscope.cn/"
  api_key: ""  # 填入你的 ModelScope API key

# ============================================================
# Provider 3: Z-Image (本地 ComfyUI 中间件)
# 如果你有本地 ComfyUI 部署
# ============================================================
zimage:
  base_url: "http://219.147.109.250:8198/mw/api/v1"
  api_key: ""  # 可选
  default_workflow: "z_image_turbo"
  poll_interval: 3
  max_wait_time: 300

# ============================================================
# Provider 4: 火山引擎 (Doubao / 豆包)
# https://www.volcengine.com/docs/6791/1298726
# ============================================================
volcengine:
  base_url: ""  # 填入火山引擎 API base URL
  api_key: ""   # 填入你的火山引擎 API key

# ============================================================
# Provider 5: ApiMart
# ============================================================
ApiMart:
  api_base: ""  # 填入 ApiMart API base URL
  api_key: ""   # 填入你的 ApiMart API key

# ============================================================
# 模型配置（通常不需要修改）
# ============================================================
image_models:
  gemini-3-pro-image:
    model_name: "gemini-2.0-flash-preview-image-generation"
    provider: google-local
  z-image-tongyi:
    model_name: "z-image-tongyi"
    provider: modelscope
  z-image:
    model_name: "z_image_turbo"
    provider: zimage
  doubao-4:
    model_name: "doubao-seedream-4-0-250828"
    provider: volcengine
    default_size: "2K"
    watermark: true
  nano-banana-pro:
    model_name: "gemini-3-pro-image-preview"
    provider: apimart
