# 日本浮世绘风格
name: ukiyoe
description: 日本浮世绘艺术风格（江户时代木版画）

prompt_template: |
  日本浮世绘艺术风格（江户时代木版画）：
  - 平面化构图，强烈的装饰性线条
  - 鲜艳饱和的色彩：靛蓝、朱红、金黄、翠绿
  - 大胆的色块对比，渐变过渡（bokashi技法）
  - 简洁的轮廓线，流畅优雅
  - 富有诗意的留白，东方美学意境
  - 扁平透视，层次分明
  - 图中不要有任何文字、标签、印章

colors:
  primary: "#1E3A5F"
  accent: "#C41E3A"
  secondary: "#D4A017"
  tertiary: "#228B22"
  background: "#F5F5DC"

characteristics:
  - 平面化构图
  - 装饰性线条
  - 鲜艳饱和色彩
  - 渐变过渡
  - 东方美学
  - 扁平透视

best_for:
  - 历史故事
  - 东方文化
  - 传统艺术
  - 古典文学
  - 日本相关
