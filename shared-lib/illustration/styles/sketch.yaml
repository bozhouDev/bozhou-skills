# 手绘草稿风格
name: sketch
description: 手绘草稿风格，原始真实，适合创意和头脑风暴

prompt_template: |
  手绘草稿插画风格：
  - 铅笔或记号笔的手绘感
  - 略带潦草的线条
  - 未完成的草稿质感
  - 笔记本纸张背景
  - 涂鸦和标注的感觉
  - 图中不要有任何文字、标签、说明

colors:
  primary: "#333333"
  accent: "#FF9500"
  background: "#FFFEF0"

characteristics:
  - 手绘质感
  - 草稿风格
  - 未完成感
  - 笔记本风
  - 真实自然

best_for:
  - 创意想法
  - 头脑风暴
  - 初步概念
  - 设计思路
  - 笔记分享
