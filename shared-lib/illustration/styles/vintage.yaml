# 复古做旧风格
name: vintage
description: 复古做旧，怀旧美学，适合历史和传记内容

prompt_template: |
  复古做旧插画风格：
  - 泛黄的纸张质感
  - 褪色的复古色调
  - 老式印刷的纹理
  - 怀旧的设计元素
  - 历史文档的感觉
  - 图中不要有任何文字、标签、说明

colors:
  primary: "#5C4033"
  accent: "#8B4513"
  background: "#F4E4BC"

characteristics:
  - 泛黄质感
  - 复古色调
  - 印刷纹理
  - 怀旧元素
  - 历史感

best_for:
  - 历史故事
  - 人物传记
  - 经典回顾
  - 复古文化
  - 传统主题
