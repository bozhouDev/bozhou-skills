# 精致优雅风格
name: elegant
description: 精致优雅，专业商务风格，适合思想领袖和商业内容

prompt_template: |
  精致优雅商务插画风格：
  - 简洁高端的视觉设计
  - 柔和的米白色和金色调
  - 精致的线条和细节
  - 专业的构图和留白
  - 图中不要有任何文字、标签、说明

colors:
  primary: "#2C3E50"
  accent: "#C9A962"
  background: "#FAF9F6"

characteristics:
  - 高端专业感
  - 柔和色调
  - 精致线条
  - 优雅留白
  - 商务气质

best_for:
  - 商业分析
  - 思想领袖
  - 高端产品
  - 企业报告
  - 专业服务
