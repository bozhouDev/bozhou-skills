# 扁平插画风格
name: flat
description: 现代扁平矢量插画风格，商业通用

prompt_template: |
  现代扁平矢量插画风格：
  - 几何化的形状，清晰的轮廓
  - 鲜明但不刺眼的色块（蓝、橙、绿、紫）
  - 没有渐变或极少渐变，色块分明
  - 简化的人物造型，无过多细节
  - 干净整洁，专业感强
  - 适合商业和产品展示
  - 图中不要有任何文字

colors:
  primary: "#4A90D9"
  secondary: "#FF6B6B"
  tertiary: "#4ECDC4"
  accent: "#9B59B6"
  background: "#F8F9FA"

characteristics:
  - 几何形状
  - 色块分明
  - 无渐变
  - 简化人物
  - 专业感
  - 商业风格

best_for:
  - 商业报告
  - 产品介绍
  - 企业培训
  - 通用配图
  - 营销材料
  - 流程说明
