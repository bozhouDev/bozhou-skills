# 纽约客杂志风格
name: newyorker
description: 《纽约客》杂志编辑漫画风格，极简线条艺术

prompt_template: |
  《纽约客》杂志编辑漫画风格：
  - 钢笔墨水速写，极简线条艺术
  - 黑白素描配朱红色点缀（色号#E34234）
  - 干净的白色背景，松弛的线条
  - 简洁留白，富有巧思的幽默感
  - 图中不要有任何文字、标签、说明

colors:
  primary: "#000000"
  accent: "#E34234"
  background: "#FFFFFF"

characteristics:
  - 钢笔墨水速写
  - 极简线条
  - 黑白为主
  - 朱红点缀
  - 大量留白
  - 幽默巧思

best_for:
  - 人文社科
  - 深度评论
  - 社会观察
  - 文化分析
  - 个人随笔
