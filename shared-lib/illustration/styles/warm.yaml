# 温暖亲切风格
name: warm
description: 温暖亲切的插画风格，适合生活和情感内容

prompt_template: |
  温暖亲切插画风格：
  - 柔和的暖色调（橙色、黄色、棕色、米色）
  - 圆润的线条，没有尖锐的边角
  - 温馨的场景：家庭、咖啡厅、阳光、植物
  - 柔和的光影，像午后阳光
  - 人物表情友善温暖
  - 有手绘质感，但不粗糙
  - 图中不要有任何文字

colors:
  primary: "#F4A460"
  secondary: "#DEB887"
  accent: "#FF7F50"
  background: "#FFF8DC"
  text: "#8B4513"

characteristics:
  - 暖色调
  - 圆润线条
  - 温馨场景
  - 柔和光影
  - 友善氛围
  - 手绘质感

best_for:
  - 生活方式
  - 情感故事
  - 个人成长
  - 亲子教育
  - 心理健康
  - 美食分享
