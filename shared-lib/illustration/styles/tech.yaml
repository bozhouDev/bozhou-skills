# 科技数码风格
name: tech
description: 现代科技数码风格，未来感设计

prompt_template: |
  现代科技数码插画风格：
  - 深色背景（深蓝#1A365D或近黑#0D1117）
  - 霓虹色点缀（青色#00D4FF、绿色#00FF88）
  - 几何线条、电路图案、数据流
  - 发光效果、渐变光晕
  - 简洁现代，未来感十足
  - 可包含抽象的科技元素：代码、芯片、网络节点
  - 图中不要有任何文字、标签、说明

colors:
  primary: "#1A365D"
  background: "#0D1117"
  accent: "#00D4FF"
  glow: "#00FF88"
  secondary: "#6B46C1"

characteristics:
  - 深色背景
  - 霓虹光效
  - 几何线条
  - 电路图案
  - 未来感
  - 发光效果

best_for:
  - AI工具
  - 科技产品
  - 编程教程
  - 数据分析
  - 软件介绍
  - 技术解读
